<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Access</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    overflow:hidden;
    font-family:Arial, sans-serif;
    color:white;
    text-align:center;

    background:linear-gradient(-45deg,#ff0000,#000000,#8b0000,#330000);
    background-size:400% 400%;
    animation:bgMove 8s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

h1{
    font-size:60px;
    text-shadow:0 0 20px red;
    animation:blink 1s infinite;
}

p{
    font-size:24px;
    width:80%;
}

@keyframes blink{
    0%,100%{opacity:1;}
    50%{opacity:0.3;}
}
</style>
</head>

<body>

<h1>⚠️ تم الوصول إلى النظام ⚠️</h1>

<p>
.
</p>

<script>
setTimeout(()=>{
    alert("لا تحاول الخروج من الموقع ");
},8000);
</script>

</body>
</html>
